<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
    <meta charset="UTF-8">
    <title>Register in TodoApp</title>
    <link rel="stylesheet" th:href="@{/registration-page.css}"/>
</head>
<body>
<div class="registration-container">
    <form class="register-form" th:action="@{/register}" method="post">
        <h2>Register</h2>
        <div class="register-form-parent">
            <label for="registerLogin">Login</label>
            <input type="text" name="registerLogin" id="registerLogin">
        </div>
        <div class="register-form-parent">
            <label for="registerPassword">Password</label>
            <input type="password" name="registerPassword" id="registerPassword">
        </div>
        <div class="register-form-parent">
            <label for="registerPasswordAgain">Password again</label>
            <input type="password" name="registerPasswordAgain" id="registerPasswordAgain">
        </div>
        <div class="registerButton">
            <button class="registerBtn">Register</button>
        </div>
    </form>
</div>


<div th:replace="fragments/footer :: footer"></div>
</body>
</html>
